<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Air Algerie PDF Flight Extractor</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="spinner" class="spinner hidden"></div>

  <div class="container">
    <h1 class="title">Air Algerie PDF Flight Extractor</h1>

    <label class="label" for="pdfFile">Select PDF file</label>
    <input id="pdfFile" type="file" accept="application/pdf" />

    <div class="buttons">
      <button id="extractBtn" class="btn success-btn">Extract</button>
      <button id="exportBtn" class="btn" disabled>Export CSV</button>
    </div>

    <p id="status">Ready.</p>

    <div class="card">
      <h2>Results</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Raw Flight</th>
              <th>Shown As</th>
              <th>Aircraft Reg</th>
              <th>Route</th>
              <th>Page</th>
            </tr>
          </thead>
          <tbody id="resultsBody">
            <tr>
              <td colspan="6">No data yet.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="signature">Air Algerie Extractor Pro</div>

  <script type="module" src="script.js"></script>
</body>
</html>
